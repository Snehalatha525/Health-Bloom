<!DOCTYPE html>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #00796b; /* Color from your file */
            color: white;
            padding: 10px 0;
        }
        .sticky-nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

            text-align: center;
            background-color: #e0f2f1; /* Light teal */
            border-radius: 10px;
            padding: 20px;
        }
        .main-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .menu-card {
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .menu-card:hover {
            transform: scale(1.05);
        }
        .bg-teal { background-color: #004d40; color: white; } /* From your file */
        .bg-orange { background-color: #ff6f00; color: white; } /* From your file */
        .bg-light-blue { background-color: #0288d1; color: white; } /* From your file */

    <!-- Sticky Navigation Bar -->

        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">

            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
